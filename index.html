<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doomscroll Video</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
      }

      #video-container {
        position: relative;
        width: 50vh;
        height: 80vh;
        background: #000;
        overflow: hidden;
      }

      video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      video.fade-in {
        animation: fadeIn 140ms ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="video-container"></div>
    <script src="main.js"></script>
  </body>
</html>
